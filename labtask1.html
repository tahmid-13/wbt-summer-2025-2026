<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Task 1</title>
    <link rel="stylesheet" href="styyle.css">
</head>
<body>
                <form action="#" method="post">
                <fieldset>
                    <legend>
                        Personal Information
                    </legend>
                    <label for="name">Full name:  </label>
                    <input type="text"  name="name" id="name" required>
                <br> <br>
                    <label for="id">Student Id:  </label>
                    <input type="id"  name="id" id="id" required> 

                <br> <br> 
                    
                    <label for="email">Email:  </label>
                    <input type="email"  name="email" id="email" required> 

                    <br> <br> 

                    <label for="phone">Phone Number :  </label>
                    <input type="tel"  name="phone" id="phone" required> 
                    
                <br> <br>
                    
                    <label for="dob">Date of Birth:  </label>
                    <input type="date"  name="dob" id="dob" required>

                <br> <br>
                <input type="radio" id="male" name="gender" value="Male">
                <label for="male">Male</label> 

                <input type="radio" id="female" name="gender" value="Female">
                <label for="female">Female</label> 

                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Other</label>
                </fieldset>

                <fieldset>
                    <legend>
                        Academic Information
                    </legend>
                    <label for =Department>Department: </label>
                    <select name="Department" id="Department">
                        <option value="CSE">CSE</option>
                        <option value="EEE">EEE</option>
                        <option value="BBA">BBA</option>
                        <option value="English">English</option>
                        <option value="Civil Engineering">Civil Engineering</option>
                        </select>
                        <br> <br>

                        <label for="semester">Semester: </label>
                        <select name="semester" id="semester">
                            <option value="1st">1st</option>
                            <option value="2nd">2nd</option>
                            <option value="3rd">3rd</option>
                            <option value="4th">4th</option>
                            <option value="5th">5th</option>
                            <option value="6th">6th</option>
                            <option value="7th">7th</option>
                            <option value="8th">8th</option>
                        </select>

                </fieldset>

                <fieldset>
                <legend>
                    Skills
                </legend>
                
                    <input type="checkbox" name="skills" id="c" value="c">
                    <label for="c">C</label><br>
                    <input type="checkbox" name="skills" id="c++" value="c++">
                    <label for="c++">C++</label><br>
                    <input type="checkbox" name="skills" id="java" value="java">
                    <label for="java">Java</label><br>
                    <input type="checkbox" name="skills" id="python" value="python">
                    <label for="python">Python</label><br>
                    <input type="checkbox" name="skills" id="javascript" value="javascript">
                    <label for="javascript">JavaScript</label><br>
            </fieldset>
            <fieldset>
                <legend>
                  Additional Information
                </legend>
                
                    <label for="address">Address: </label>
                    <textarea name="address" id="address" cols="30" rows="5"></textarea>

                    <br> <br>

                    <label for="photo">upload your photo: </label><br>
                    <input type="file" name="photo" id="photo">

                    <br> <br>

                    <label for ="comments">Comments/Suggesions: </label><br> 
                    <textarea name="comments" id="comments" cols="40" rows="5"></textarea>
            
                </fieldset>
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">


            </form>


</body>
</html>
